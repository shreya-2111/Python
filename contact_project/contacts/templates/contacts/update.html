<!DOCTYPE html>
<html>
<head>
    <title>Update Contact</title>

    <style>
        body { font-family: Arial; background: #eef2f3; }

        .box {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: orange;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>

</head>
<body>

<div class="box">
    <h2>Update Contact</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" value="{{ contact.name }}">
        <input type="text" name="phone" value="{{ contact.phone }}">
        <input type="email" name="email" value="{{ contact.email }}">
        <textarea name="address">{{ contact.address }}</textarea>

        <button type="submit">Update</button>
    </form>
</div>

</body>
</html>
