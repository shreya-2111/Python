<!DOCTYPE html>
<html>
<head>
    <title>Add Contact</title>

    <style>
        body { font-family: Arial; background: #eef2f3; }

        .box {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>

</head>
<body>

<div class="box">
    <h2>Add Contact</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Name">
        <input type="text" name="phone" placeholder="Phone">
        <input type="email" name="email" placeholder="Email">
        <textarea name="address" placeholder="Address"></textarea>

        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
