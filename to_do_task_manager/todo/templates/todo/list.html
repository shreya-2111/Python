<h2>Task List</h2>
<a href="/todo/add/">Add Task</a>

<table border="1">
<tr>
    <th>Title</th>
    <th>Description</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for task in tasks %}
<tr>
    <td>{{ task.title }}</td>
    <td>{{ task.description }}</td>
    <td>
        {% if task.is_completed %}
            Completed
        {% else %}
            Pending
        {% endif %}
    </td>
    <td>
        <a href="/todo/update/{{ task.id }}">Edit</a>
        <a href="/todo/delete/{{ task.id }}">Delete</a>
    </td>
</tr>
{% endfor %}
</table>
