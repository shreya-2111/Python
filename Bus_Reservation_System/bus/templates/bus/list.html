<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}
h2{text-align:center;}
.add-btn{
    background:green;
    color:white;
    padding:10px;
    text-decoration:none;
}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
}
th{
    background:#007bff;
    color:white;
    padding:10px;
}
td{
    padding:10px;
    text-align:center;
    border:1px solid #ddd;
}
.edit-btn{
    background:orange;
    color:white;
    padding:5px 10px;
    text-decoration:none;
}
.delete-btn{
    background:red;
    color:white;
    padding:5px 10px;
    text-decoration:none;
}
</style>
</head>
<body>

<h2>Bus Reservation System</h2>

<a href="/bus/add/" class="add-btn">Add Bus</a>

<table>
<tr>
    <th>ID</th>
    <th>Bus Name</th>
    <th>Source</th>
    <th>Destination</th>
    <th>Seats</th>
    <th>Price</th>
    <th>Action</th>
</tr>

{% for bus in buses %}
<tr>
    <td>{{ bus.id }}</td>
    <td>{{ bus.bus_name }}</td>
    <td>{{ bus.source }}</td>
    <td>{{ bus.destination }}</td>
    <td>{{ bus.seats }}</td>
    <td>{{ bus.price }}</td>
    <td>
        <a href="/bus/update/{{ bus.id }}/" class="edit-btn">Edit</a>
        <a href="/bus/delete/{{ bus.id }}/" class="delete-btn">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
