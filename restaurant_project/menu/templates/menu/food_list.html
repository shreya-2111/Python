{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu</title>
    <style> 
        body {
    font-family: Arial;
    background-color: #f2f2f2;
    margin: 0;
}

header {
    background-color: #ff5733;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    width: 80%;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0px 0px 8px rgba(0,0,0,0.1);
}

button {
    padding: 6px 12px;
    background-color: #ff5733;
    color: white;
    border: none;
    border-radius: 4px;
}
    </style>
</head>
<body>

<header>
    <h1>Restaurant Menu</h1>
</header>

<div class="container">

    <form method="get">
        <select name="category">
            <option value="">All</option>
            <option value="Veg">Veg</option>
            <option value="Non-Veg">Non-Veg</option>
            <option value="Drinks">Drinks</option>
        </select>
        <button type="submit">Filter</button>
    </form>

    <br>
    <a href="{% url 'add_food' %}">Add Food</a>
    <br><br>

    {% for food in foods %}
        <div class="card">
            <h3>{{ food.name }}</h3>
            <p>Category: {{ food.category }}</p>
            <p>Price: ₹{{ food.price }}</p>
            <p>{{ food.description }}</p>
        </div>
    {% empty %}
        <p>No items found.</p>
    {% endfor %}

</div>

</body>
</html>
