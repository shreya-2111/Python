<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form</title>
    <style>
        /* Global styles */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #cdb4db;
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 36px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #4a3f52;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Form styling */
        form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 18px;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #cdb4db; /* Base color */
            outline: none;
        }

        button[type="submit"] {
            background-color: #cdb4db; /* Base color */
            color: white;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #d7a3d5;
        }

        .back-link {
            text-decoration: none;
            background-color: #f0f0f0;
            color: #333;
            padding: 12px;
            font-size: 18px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .back-link:hover {
            background-color: #ddd;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                width: 100%;
            }

            h2 {
                font-size: 20px;
            }

            .form-group label {
                font-size: 16px;
            }

            button[type="submit"], .back-link {
                font-size: 16px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Product Management</h1>
</header>

<div class="container">
    <h2>Product Form</h2>

    <form method="post">
        {% csrf_token %}
        
        <!-- Render each field with proper label and input -->
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}

        <button type="submit">Save</button>
    </form>

    <a href="{% url 'product_list' %}" class="back-link"> ⇐ Back to Product List</a>
</div>

</body>
</html>
