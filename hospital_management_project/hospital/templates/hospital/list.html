<!DOCTYPE html>
<html>
<head>
    <title>Patient List</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
            padding:20px;
        }

        h2{
            text-align:center;
            color:#333;
        }

        .add-btn{
            background:green;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border-radius:5px;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
            background:white;
            box-shadow:0 0 10px #ccc;
        }

        th{
            background:#007bff;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f1f1f1;
        }

        .edit-btn{
            background:orange;
            color:white;
            padding:5px 10px;
            text-decoration:none;
            border-radius:4px;
        }

        .delete-btn{
            background:red;
            color:white;
            padding:5px 10px;
            text-decoration:none;
            border-radius:4px;
        }
    </style>
</head>

<body>

<h2>Patient List</h2>

<a href="/hospital/add/" class="add-btn">Add Patient</a>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Disease</th>
        <th>Mobile</th>
        <th>Action</th>
    </tr>

    {% for patient in patients %}
    <tr>
        <td>{{ patient.id }}</td>
        <td>{{ patient.name }}</td>
        <td>{{ patient.age }}</td>
        <td>{{ patient.disease }}</td>
        <td>{{ patient.mobile }}</td>
        <td>
            <a href="/hospital/update/{{ patient.id }}/" class="edit-btn">Edit</a>
            <a href="/hospital/delete/{{ patient.id }}/" class="delete-btn">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
